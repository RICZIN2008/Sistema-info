<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Cyber Panel</title>

<style>
body{
margin:0;
background:#000;
color:#00ff88;
font-family:monospace;
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.scan{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(transparent,rgba(0,255,136,0.05),transparent);
animation:scan 4s linear infinite;
pointer-events:none;
}

@keyframes scan{
0%{transform:translateY(-100%);}
100%{transform:translateY(100%);}
}

.box{
width:100%;
max-width:800px;
border:1px solid #00ff88;
border-radius:12px;
padding:16px;
background:rgba(0,0,0,0.9);
box-shadow:0 0 25px #00ff8840;
}

h1{
font-size:18px;
margin-bottom:12px;
text-shadow:0 0 8px #00ff88;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
border:1px solid #00ff88;
border-radius:8px;
padding:10px;
background:rgba(0,255,136,0.05);
}

.label{
font-size:11px;
opacity:.7;
}

.value{
font-size:13px;
margin-top:4px;
word-break:break-word;
}

.small{
font-size:11px;
opacity:.6;
margin-top:5px;
}
</style>
</head>

<body>

<div class="scan"></div>

<div class="box">

<h1>▣ OSINT CYBER DASHBOARD</h1>

<div class="grid">

<div class="card"><div class="label">IP</div><div class="value" id="ip">--</div></div>
<div class="card"><div class="label">Localização</div><div class="value" id="loc">--</div></div>
<div class="card"><div class="label">Provedor</div><div class="value" id="isp">--</div></div>

<div class="card"><div class="label">Dispositivo</div><div class="value" id="device">--</div></div>
<div class="card"><div class="label">Sistema</div><div class="value" id="os">--</div></div>
<div class="card"><div class="label">Tela</div><div class="value" id="screen">--</div></div>

<div class="card"><div class="label">Bateria</div><div class="value" id="battery">--</div></div>
<div class="card"><div class="label">Idioma</div><div class="value" id="lang">--</div></div>
<div class="card"><div class="label">Timezone</div><div class="value" id="tz">--</div></div>

<div class="card"><div class="label">User Agent</div><div class="value small" id="ua"></div></div>

</div>

</div>

<script>

/* USER AGENT */
const ua = navigator.userAgent;
document.getElementById("ua").innerText = ua;

/* DEVICE */
function device(){
if(/Moto/i.test(ua)) return "Motorola";
if(/SM-/i.test(ua)) return "Samsung";
if(/iPhone/i.test(ua)) return "iPhone";
if(/Android/i.test(ua)) return "Android";
return "Unknown";
}
document.getElementById("device").innerText = device();

/* SYSTEM */
document.getElementById("os").innerText =
navigator.userAgentData?.platform || navigator.platform;

/* SCREEN */
document.getElementById("screen").innerText =
screen.width + "x" + screen.height;

/* LANG */
document.getElementById("lang").innerText =
navigator.language;

/* TZ */
document.getElementById("tz").innerText =
Intl.DateTimeFormat().resolvedOptions().timeZone;

/* BATTERY FIXED */
async function battery(){
try{

if(!navigator.getBattery){
document.getElementById("battery").innerText = "N/A";
return;
}

const b = await navigator.getBattery();

function update(){
document.getElementById("battery").innerText =
Math.round(b.level * 100) + "%";
}

update();

b.addEventListener("levelchange", update);
b.addEventListener("chargingchange", update);

}catch(e){
document.getElementById("battery").innerText = "N/A";
}
}

battery();

/* MULTI API OSINT (ROBUSTO) */
async function getIP(){

const apis = [
"https://ipwho.is/",
"https://ipapi.co/json/",
"https://ipinfo.io/json"
];

for(const url of apis){
try{
const r = await fetch(url);
const d = await r.json();

if(d && (d.ip || d.success !== false)){
return d;
}
}catch(e){}
}

return null;
}

async function load(){

const d = await getIP();

if(!d){
ip.innerText="Erro API";
loc.innerText="N/A";
isp.innerText="N/A";
return;
}

ip.innerText = d.ip || d.query || "N/A";

const city = d.city || "N/A";
const region = d.region || d.region_name || "N/A";
const country = d.country_name || d.country || "N/A";

loc.innerText = `${city} - ${region} - ${country}`;

isp.innerText = d.org || d.isp || "N/A";

}

load();

</script>

</body>
</html>
