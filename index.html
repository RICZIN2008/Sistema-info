<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Cyber Panel</title>

<style>
body{
margin:0;
background:#000;
color:#00ff88;
font-family:monospace;
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.scan{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(transparent,rgba(0,255,136,0.05),transparent);
animation:scan 4s linear infinite;
pointer-events:none;
}

@keyframes scan{
0%{transform:translateY(-100%);}
100%{transform:translateY(100%);}
}

.box{
width:100%;
max-width:800px;
border:1px solid #00ff88;
border-radius:12px;
padding:16px;
background:rgba(0,0,0,0.9);
box-shadow:0 0 25px #00ff8840;
}

h1{
font-size:18px;
margin-bottom:12px;
text-shadow:0 0 8px #00ff88;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
border:1px solid #00ff88;
border-radius:8px;
padding:10px;
background:rgba(0,255,136,0.05);
}

.label{
font-size:11px;
opacity:.7;
}

.value{
font-size:13px;
margin-top:4px;
word-break:break-word;
}

.small{
font-size:11px;
opacity:.6;
margin-top:5px;
}
</style>
</head>

<body>

<div class="scan"></div>

<div class="box">

<h1>▣ OSINT CYBER DASHBOARD</h1>

<div class="grid">

<div class="card">
<div class="label">IP</div>
<div class="value" id="ip">--</div>
</div>

<div class="card">
<div class="label">Localização</div>
<div class="value" id="loc">--</div>
</div>

<div class="card">
<div class="label">Provedor</div>
<div class="value" id="isp">--</div>
</div>

<div class="card">
<div class="label">Dispositivo</div>
<div class="value" id="device">--</div>
</div>

<div class="card">
<div class="label">Sistema</div>
<div class="value" id="os">--</div>
</div>

<div class="card">
<div class="label">Tela</div>
<div class="value" id="screen">--</div>
</div>

<div class="card">
<div class="label">Bateria</div>
<div class="value" id="battery">--</div>
</div>

<div class="card">
<div class="label">Idioma</div>
<div class="value" id="lang">--</div>
</div>

<div class="card">
<div class="label">Timezone</div>
<div class="value" id="tz">--</div>
</div>

<div class="card">
<div class="label">User Agent</div>
<div class="value small" id="ua"></div>
</div>

</div>

</div>

<script>

/* USER AGENT */
const ua = navigator.userAgent;
document.getElementById("ua").innerText = ua;

/* DEVICE DETECT */
function device(){
if(/Moto/i.test(ua)) return "Motorola (Moto Device)";
if(/SM-/i.test(ua)) return "Samsung Galaxy";
if(/iPhone/i.test(ua)) return "iPhone";
if(/Android/i.test(ua)) return "Android Device";
return "Unknown";
}
document.getElementById("device").innerText = device();

/* OS */
document.getElementById("os").innerText = navigator.platform;

/* SCREEN */
document.getElementById("screen").innerText =
screen.width + "x" + screen.height;

/* LANG */
document.getElementById("lang").innerText =
navigator.language;

/* TIMEZONE */
document.getElementById("tz").innerText =
Intl.DateTimeFormat().resolvedOptions().timeZone;

/* BATTERY */
async function battery(){
if(!navigator.getBattery){
document.getElementById("battery").innerText="N/A";
return;
}

const b = await navigator.getBattery();

function update(){
document.getElementById("battery").innerText =
Math.round(b.level*100) + "%";
}

update();
b.onlevelchange = update;
b.onchargingchange = update;
}
battery();

/* IP + LOCATION REAL */
fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(data=>{

document.getElementById("ip").innerText = data.ip;
document.getElementById("loc").innerText =
data.city + " - " + data.region + " - " + data.country_name;

document.getElementById("isp").innerText = data.org;

})
.catch(()=>{
document.getElementById("ip").innerText = "Erro API";
});

</script>

</body>
</html>
